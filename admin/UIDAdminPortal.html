<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal | Smart City</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body{font-family:Inter;background:#000;color:#fff;padding:40px;}
.card{background:#111;padding:30px;border-radius:20px;margin-bottom:30px;}
input,select{padding:10px;margin:10px 0;background:#222;border:none;color:#fff;border-radius:8px;}
button{padding:10px 20px;background:#2997ff;border:none;color:#fff;border-radius:8px;cursor:pointer;}
.complaint{background:#111;padding:15px;margin-top:15px;border-radius:10px;}
.stats{display:flex;gap:20px;margin-bottom:20px;}
.stat{background:#111;padding:20px;border-radius:10px;}
</style>
</head>
<body>

<h1>Admin Portal</h1>

<div id="login" class="card">
<h2>Admin Login</h2>
<input type="password" id="password" placeholder="Enter Admin Password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">

<div class="card">
<h2>Statistics</h2>
<div class="stats">
<div class="stat">Total: <span id="total"></span></div>
<div class="stat">Pending: <span id="pending"></span></div>
<div class="stat">In Progress: <span id="progress"></span></div>
<div class="stat">Resolved: <span id="resolved"></span></div>
</div>
</div>

<div class="card">
<h2>All Complaints</h2>
<div id="complaints"></div>
</div>

</div>

<script>
let complaints = JSON.parse(localStorage.getItem("complaints")) || [];
const ADMIN_PASSWORD="admin123";

function login(){
if(password.value===ADMIN_PASSWORD){
login.style.display="none";
adminPanel.style.display="block";
render();
}else{
alert("Incorrect Password");
}
}

function render(){
let container=document.getElementById("complaints");
container.innerHTML="";

complaints.forEach(c=>{
container.innerHTML+=`
<div class="complaint">
<strong>${c.category}</strong><br>
${c.description}<br>
Contact: ${c.contact}<br>
<select onchange="updateStatus(${c.id},this.value)">
<option ${c.status==="Pending"?"selected":""}>Pending</option>
<option ${c.status==="In Progress"?"selected":""}>In Progress</option>
<option ${c.status==="Resolved"?"selected":""}>Resolved</option>
</select>
</div>`;
});

updateStats();
}

function updateStatus(id,status){
complaints=complaints.map(c=>{
if(c.id===id){c.status=status;}
return c;
});
localStorage.setItem("complaints",JSON.stringify(complaints));
render();
}

function updateStats(){
total.innerText=complaints.length;
pending.innerText=complaints.filter(c=>c.status==="Pending").length;
progress.innerText=complaints.filter(c=>c.status==="In Progress").length;
resolved.innerText=complaints.filter(c=>c.status==="Resolved").length;
}
</script>

</body>
</html>
